spring.application.name=weather-app

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3305/weatherdb?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mani@1234}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=weather-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.admin.auto-create=false
spring.kafka.admin.fatal-if-broker-not-available=false
spring.kafka.admin.fail-fast=false

server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain,text/css,application/javascript
server.error.include-message=never
server.error.include-stacktrace=never

# OpenWeatherMap API Key
openweathermap.api.key=${OPENWEATHERMAP_API_KEY:}

jwt.secret=${JWT_SECRET:9a4f4342522e9fde07469502758133379207e4d8174548d197de181f0b7849c6}
jwt.expiration=${JWT_EXPIRATION:86400000}
