spring.application.name=weather-app
spring.datasource.url=\${DB_URL:jdbc:mysql://localhost:3306/weatherdb?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=\${DB_USER:root}
spring.datasource.password=\${DB_PASS:root}
spring.jpa.hibernate.ddl-auto=update
spring.data.redis.host=\${REDIS_HOST:localhost}
spring.data.redis.port=\${REDIS_PORT:6379}
spring.kafka.bootstrap-servers=\${KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=weather-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
openweathermap.api.key=\${OPENWEATHER_API_KEY:YOUR_API_KEY}
jwt.secret=\${JWT_SECRET:9a4f4342522e9fde07469502758133379207e4d8174548d197de181f0b7849c6}
jwt.expiration=\${JWT_EXPIRATION:86400000}
